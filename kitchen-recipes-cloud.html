<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {

  html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  body {

      radial-gradient(1200px 620px at 82% -8%, rgba(156,124,64,0.10), transparent 60%),

  /* SCREENS */

  @keyframes screenIn { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:none; } }
  #slideshow-screen.active { height:100dvh; overflow:hidden; position:relative; animation:none; }

  .ingredients-list { list-style:none; margin-bottom:8px; }

  .admin-section-title { font-family:var(--serif); font-size:30px; font-weight:600; color:var(--cream); margin-bottom:22px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .form-group { margin-bottom:20px; }
  .form-label { display:block; font-size:12px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
  .form-input, .form-textarea, .form-select {
    width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
    padding:14px 16px; color:var(--text); font-size:16px; font-family:var(--sans); outline:none;
    box-shadow:var(--shadow-sm); transition:border-color .15s, box-shadow .15s;

  .form-input::placeholder, .form-textarea::placeholder { color:var(--muted); }

  @media(hover:hover){ .remove-btn:hover { border-color:var(--red); color:var(--red); } }
  .add-btn { background:var(--gold-soft); border:1px dashed rgba(81,98,56,0.4); color:var(--gold); border-radius:var(--r-sm); padding:14px; width:100%; cursor:pointer; font-size:14px; font-weight:500; font-family:var(--sans); margin-top:8px; transition:all .15s; }

  .step-row { display:grid; grid-template-columns:1fr 44px; gap:8px; margin-bottom:8px; align-items:start; }
  .form-actions { display:flex; gap:12px; margin-top:28px; padding-top:22px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .btn { border-radius:var(--r-pill); padding:0 26px; height:50px; font-size:16px; font-family:var(--sans); font-weight:600; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:8px; transition:transform .12s, background .15s; }
  .btn svg { width:18px; height:18px; }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--gold); color:#fff; box-shadow:0 4px 14px rgba(81,98,56,0.32); }
  .btn-primary:active { background:var(--gold-press); }
  .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); box-shadow:var(--shadow-sm); }
  .btn-danger { background:transparent; color:var(--red); border:1px solid rgba(178,59,39,0.32); }
  .recipe-list-admin { list-style:none; margin-bottom:28px; }
  .recipe-list-item { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid var(--border-2); gap:12px; }
  .recipe-list-item:last-child { border-bottom:none; }
  .rli-info { flex:1; }
  .rli-title { font-size:17px; color:var(--text); font-weight:500; }
  .rli-cat { font-size:13px; color:var(--muted); margin-top:3px; }
  .rli-actions { display:flex; gap:8px; }
  .icon-btn { display:inline-flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:var(--r-pill); padding:0 16px; height:40px; cursor:pointer; font-size:14px; font-weight:500; font-family:var(--sans); box-shadow:var(--shadow-sm); transition:all .15s; }
  .icon-btn svg { width:15px; height:15px; }
  .icon-btn:active { transform:scale(0.95); }
  .icon-btn.del { color:var(--red); }
  @media(hover:hover){ .icon-btn.del:hover { border-color:var(--red); } }

  /* TOAST */
  .toast { position:fixed; bottom:calc(34px + var(--safe-bot)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--cream); color:#f3efe6; padding:14px 26px; border-radius:var(--r-pill); font-size:15px; font-weight:500; opacity:0; transition:all .3s cubic-bezier(.2,.8,.2,1); pointer-events:none; z-index:999; box-shadow:var(--shadow-lg); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── PRESENT MODE ── */
  .icon-round { width:46px; height:46px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:var(--glass); backdrop-filter:blur(20px) saturate(1.6); -webkit-backdrop-filter:blur(20px) saturate(1.6); border:1px solid var(--border-2); color:var(--text); box-shadow:var(--shadow-sm); cursor:pointer; transition:transform .12s, background .15s; }
  .icon-round svg { width:21px; height:21px; }

  .present-topbar {

    display:flex; align-items:center; gap:14px;
    padding:calc(16px + var(--safe-top)) 24px 14px;
  }

    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }

    position:absolute; left:50%; transform:translateX(-50%); bottom:calc(22px + var(--safe-bot)); z-index:25;
    display:flex; align-items:center; gap:6px;
    background:var(--glass); backdrop-filter:blur(26px) saturate(1.7); -webkit-backdrop-filter:blur(26px) saturate(1.7);
    border:1px solid var(--border-2); border-radius:var(--r-pill); padding:8px; box-shadow:var(--shadow-md);
  }
  .present-nav-btn { display:inline-flex; align-items:center; gap:6px; height:46px; padding:0 18px; border-radius:var(--r-pill); border:none; background:transparent; color:var(--text); font-size:15px; font-weight:500; font-family:var(--sans); cursor:pointer; transition:transform .12s, background .15s; }

  .slide-dots { display:flex; gap:7px; align-items:center; padding:0 10px; }

  .slide-step-text { font-size:clamp(16px,1.8vw,21px); line-height:1.55; color:var(--text); padding-top:5px; }
  .slide-notes { background:var(--gold-soft); border:1px solid rgba(81,98,56,0.22); border-radius:var(--radius); padding:22px 26px; font-size:clamp(16px,1.7vw,19px); line-height:1.65; color:var(--ink-soft); max-width:760px; }

<script>
// ── DATA STORE (IndexedDB) ──
const DB_NAME = 'kitchen_recipes_db';
const STORE = 'recipes';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(recipe) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(recipe);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// Persist the whole in-memory array (used after edits/imports). Clears then re-writes.
function saveRecipes(list) {
  return new Promise((resolve) => {
    if (!db) return resolve(false);
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    store.clear();
    list.forEach(r => store.put(r));
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => {
      alert('Could not save to storage. The device may be critically low on space.');
      resolve(false);
    };
  });
}

// ── CLOUD LAYER (Supabase) ──
let supa = null;
let cloudMode = false;     // true when keys are configured
let isOnline = navigator.onLine;
let currentUser = null;    // signed-in chef, or null
let pendingWrites = [];    // edits made while offline, pushed on reconnect

const CLOUD_TABLE = 'recipes';
const PENDING_KEY = 'kitchen_pending_writes';

function initCloud() {
  if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
    try {
      supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      cloudMode = true;
      // restore any queued offline writes
      try { pendingWrites = JSON.parse(localStorage.getItem(PENDING_KEY)) || []; } catch { pendingWrites = []; }
      return true;
    } catch (e) { console.error('Supabase init failed', e); cloudMode = false; }
  }
  return false;
}

async function cloudFetchAll() {
  const { data, error } = await supa.from(CLOUD_TABLE).select('*').order('title');
  if (error) throw error;
  // DB columns are snake_case; map to the app's shape
  return (data || []).map(row => ({
    id: row.id,
    title: row.title,
    category: row.category,
    description: row.description,
    servings: row.servings,
    prepTime: row.prep_time,
    cookTime: row.cook_time,
    ingredients: row.ingredients || [],
    steps: row.steps || [],
    notes: row.notes,
    image: row.image,
  }));
}

function toRow(r) {
  return {
    id: r.id, title: r.title, category: r.category, description: r.description,
    servings: r.servings, prep_time: r.prepTime, cook_time: r.cookTime,
    ingredients: r.ingredients, steps: r.steps, notes: r.notes, image: r.image,
  };
}

async function cloudUpsert(recipe) {
  const { error } = await supa.from(CLOUD_TABLE).upsert(toRow(recipe));
  if (error) throw error;
}
async function cloudDelete(id) {
  const { error } = await supa.from(CLOUD_TABLE).delete().eq('id', id);
  if (error) throw error;
}

function queueWrite(op, payload) {
  pendingWrites.push({ op, payload, ts: Date.now() });
  localStorage.setItem(PENDING_KEY, JSON.stringify(pendingWrites));
}
async function flushPending() {
  if (!cloudMode || !isOnline || !currentUser || pendingWrites.length === 0) return;
  setSync('syncing');
  const queue = [...pendingWrites];
  for (const w of queue) {
    try {
      if (w.op === 'upsert') await cloudUpsert(w.payload);
      else if (w.op === 'delete') await cloudDelete(w.payload);
      pendingWrites.shift();
      localStorage.setItem(PENDING_KEY, JSON.stringify(pendingWrites));
    } catch (e) { console.error('flush failed, will retry', e); break; }
  }
  setSync();
}

// ── SYNC STATUS PILL ──
function setSync(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  dot.className = 'sync-dot';
  if (!cloudMode) { label.textContent = 'Local'; return; }
  if (state === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Syncing…'; return; }
  if (isOnline) {
    dot.classList.add('online');
    label.textContent = currentUser ? 'Synced' : 'Live';
  } else {
    dot.classList.add('offline');
    label.textContent = pendingWrites.length ? `Offline · ${pendingWrites.length} queued` : 'Offline';
  }
}

window.addEventListener('online', () => { isOnline = true; setSync(); flushPending().then(refreshFromCloud); });
window.addEventListener('offline', () => { isOnline = false; setSync(); });

let currentFilter = 'All';

function uid() { return Math.random().toString(36).slice(2,10); }

// ── PDF.JS WORKER ──
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── PIN GATE ──
const MANAGER_PIN = '4385';
let pinEntry = '';

function buildPinPad() {
  const pad = document.getElementById('pin-pad');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  pad.innerHTML = keys.map(k => {
    if (k === '') return '<div class="pin-key blank"></div>';
    return `<button class="pin-key" data-key="${k}">${k}</button>`;
  }).join('');
  pad.querySelectorAll('.pin-key[data-key]').forEach(btn => {
    btn.onclick = () => pinPress(btn.dataset.key);
  });
}

function requestManage() {
  // Cloud mode: require a real sign-in. Local-only mode: fall back to PIN.
  if (cloudMode) {
    if (currentUser) {
      showAdmin();
    } else {
      openAuth();
    }
    return;
  }
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-modal').classList.add('show');
}
function closePin() {
  document.getElementById('pin-modal').classList.remove('show');
  pinEntry = '';
  updatePinDots();
}
function pinPress(key) {
  if (key === '⌫') {
    pinEntry = pinEntry.slice(0, -1);
  } else if (pinEntry.length < 4) {
    pinEntry += key;
  }
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 150);
  }
}
function updatePinDots(error) {
  document.querySelectorAll('#pin-dots .pin-dot-input').forEach((d, i) => {
    d.classList.toggle('filled', i < pinEntry.length);
    d.classList.toggle('error', !!error);
  });
}
function checkPin() {
  if (pinEntry === MANAGER_PIN) {
    closePin();
    showAdmin();
  } else {
    updatePinDots(true);
    setTimeout(() => { pinEntry = ''; updatePinDots(); }, 600);
  }
}
buildPinPad();

// ── AUTH (cloud mode) ──
function openAuth() {
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-modal').classList.add('show');
  setTimeout(() => document.getElementById('auth-email').focus(), 100);
}
function closeAuth() {
  document.getElementById('auth-modal').classList.remove('show');
}
async function doSignIn() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  if (!email || !password) { errEl.textContent = 'Enter email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    currentUser = data.user;
    closeAuth();
    updateAuthUI();
    setSync();
    showToast('Signed in');
    await flushPending();
    await refreshFromCloud();
    showAdmin();
  } catch (e) {
    errEl.textContent = e.message || 'Sign in failed.';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

  if (cloudMode && supa) { try { await supa.auth.signOut(); } catch {} }
  currentUser = null;
  updateAuthUI();
  setSync();
  showToast('Signed out');
  showIndex();

function getCategories() {
  const cats = [...new Set(recipes.map(r => r.category).filter(Boolean))].sort();

function setFilter(tag) {
  currentFilter = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  renderIndex();
}
function renderIndex() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filterRow = document.getElementById('filter-row');
  filterRow.innerHTML = '';
  getCategories().forEach(cat => {
    const b = document.createElement('button');
    b.className = 'tag-btn' + (cat === currentFilter ? ' active' : '');
    b.dataset.tag = cat;
    b.textContent = cat;
    b.onclick = () => setFilter(cat);
    filterRow.appendChild(b);
  });

  const filtered = recipes.filter(r => {
    const matchCat = currentFilter === 'All' || r.category === currentFilter;
    const matchQ = !q || r.title.toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q) || (r.category||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('recipe-count').textContent = `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">${icon('empty')}</div><div class="empty-title">No recipes found</div><div class="empty-sub">Try adjusting your search or add a new recipe from Manage.</div></div>`;
    return;
  }

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      ${r.image ? `<img class="card-image" src="${r.image}" alt="${escAttr(r.title)}" />` : `<div class="card-image card-image-empty">${icon('image')}</div>`}
      <div class="card-pad">

        <div class="card-title">${escHtml(r.title)}</div>
        ${r.description ? `<div class="card-desc">${escHtml(r.description)}</div>` : ''}
        <div class="card-meta">
          ${r.servings ? `<span>${icon('users')} ${escHtml(r.servings)}</span>` : ''}
          ${r.prepTime ? `<span>${icon('clock')} ${escHtml(r.prepTime)}</span>` : ''}

// ── SLIDESHOW ──
function buildSlidePages(r) {
  const pages = [];
  // Page 0: Title / overview
  pages.push({ type: 'title', recipe: r });
  // Page 1: Ingredients
  pages.push({ type: 'ingredients', recipe: r });
  // Page(s): Steps — chunk into groups of 4
  const steps = r.steps || [];
  for (let i = 0; i < steps.length; i += 4) {
    pages.push({ type: 'steps', recipe: r, steps: steps.slice(i, i+4), startIndex: i });
  }
  // Final page: notes if any
  if (r.notes) pages.push({ type: 'notes', recipe: r });
  return pages;
}

function renderSlidePage(page) {
  const body = document.getElementById('slide-body');
  const r = page.recipe;

  if (page.type === 'title') {
    body.innerHTML = `
      <div style="display:grid;grid-template-columns:${r.image ? '1.3fr 1fr' : '1fr'};gap:40px;align-items:start">
        <div>
          <div class="slide-category">${escHtml(r.category || 'Uncategorized')}</div>
          <div class="slide-main-title">${escHtml(r.title)}</div>
          ${r.description ? `<div class="slide-desc">${escHtml(r.description)}</div>` : ''}
          <div class="detail-meta-row">
            ${r.servings ? `<div class="meta-chip"><strong>Servings</strong>${escHtml(r.servings)}</div>` : ''}
            ${r.prepTime ? `<div class="meta-chip"><strong>Prep Time</strong>${escHtml(r.prepTime)}</div>` : ''}
            ${r.cookTime ? `<div class="meta-chip"><strong>Cook Time</strong>${escHtml(r.cookTime)}</div>` : ''}
          </div>
        </div>
        ${r.image ? `<img class="slide-image" src="${r.image}" alt="${escAttr(r.title)}" />` : ''}
      </div>
    `;
  } else if (page.type === 'ingredients') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Ingredients</div>
      <ul class="slide-ing-list">
        ${(r.ingredients||[]).map(ing => `<li><span class="slide-ing-amount">${escHtml(ing.amount)}</span><span>${escHtml(ing.item)}</span></li>`).join('')}
      </ul>
    `;
  } else if (page.type === 'steps') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Method${slidePages.filter(p=>p.type==='steps').length > 1 ? ` (${Math.floor(page.startIndex/4)+1})` : ''}</div>
      <ol class="slide-steps-list">
        ${page.steps.map((s,i) => `<div class="slide-step"><div class="slide-step-num">${page.startIndex+i+1}</div><div class="slide-step-text">${escHtml(s)}</div></div>`).join('')}
      </ol>
    `;
  } else if (page.type === 'notes') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Chef's Notes</div>
      <div class="slide-notes"><strong>Remember</strong>${escHtml(r.notes)}</div>
    `;
  }

  // Update dots
  const dots = document.getElementById('slide-dots');
  dots.innerHTML = slidePages.map((_,i) => `<div class="slide-dot${i===slideIndex?' active':''}"></div>`).join('');

  // Update buttons
  document.getElementById('slide-prev').disabled = slideIndex === 0;
  const cl = document.getElementById('slide-count-label');
  if (cl) cl.textContent = (slideIndex + 1) + ' / ' + slidePages.length;
  const nextBtn = document.getElementById('slide-next');
  const isLast = slideIndex === slidePages.length - 1;
  nextBtn.disabled = false; // always clickable: advances, or finishes on the last slide
  nextBtn.innerHTML = isLast ? ('<span>Done</span>' + icon('check')) : ('<span>Next</span>' + icon('chevronRight'));
  nextBtn.onclick = isLast ? () => showDetail(currentRecipeId) : slideNext;
}

function startSlideshow() {
  const r = recipes.find(r => r.id === currentRecipeId);
  if (!r) return;
  slidePages = buildSlidePages(r);
  slideIndex = 0;
  document.getElementById('slide-nav-title').textContent = r.title;
  renderSlidePage(slidePages[slideIndex]);
  showScreen('slideshow-screen');
}

function slideNext() {
  if (slideIndex < slidePages.length - 1) {
    slideIndex++;
    renderSlidePage(slidePages[slideIndex]);
  }
}
function slidePrev() {
  if (slideIndex > 0) {
    slideIndex--;
    renderSlidePage(slidePages[slideIndex]);
  }
}

// swipe support
let touchStartX = 0;
document.getElementById('slideshow-screen').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('slideshow-screen').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? slideNext() : slidePrev();
}, { passive: true });

// ── DIRECT IMAGE UPLOAD ──
// Lets the chef set or replace a dish photo on any recipe (new or existing)
// without re-importing the PDF. Downscales large photos before storing.
document.getElementById('image-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  try {
    const dataUrl = await downscaleImageFile(file, 1000, 0.85);
    formImage = dataUrl;
    updatePhotoControls();
  } catch (err) {
    console.error(err);
    alert('Could not load that image. Try a JPG or PNG.');
  }
});

function downscaleImageFile(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = img.width > maxW ? maxW / img.width : 1;
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── PDF IMPORT ──
document.getElementById('pdf-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // reset so same file can be re-picked
  const progress = document.getElementById('upload-progress');
  if (progress) progress.classList.add('show');

  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    // Extract text from all pages
    let fullText = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      // Reconstruct lines using y-position
      let lastY = null, line = '';
      const lines = [];
      content.items.forEach(item => {
        const y = item.transform[5];
        if (lastY !== null && Math.abs(y - lastY) > 3) { lines.push(line.trim()); line = ''; }
        line += item.str + ' ';
        lastY = y;
      });
      if (line.trim()) lines.push(line.trim());
      fullText += lines.join('\n') + '\n';
    }

    // Extract largest image from page 1 as the dish photo
    let dishImage = null;
    try {
      dishImage = await extractDishImage(pdf);
    } catch (imgErr) { console.warn('Image extraction failed:', imgErr); }

    // Parse text into recipe fields
    const parsed = parseRecipeText(fullText, file.name);
    if (dishImage) parsed.image = dishImage;

    // Populate the form with parsed data
    populateFormFromParsed(parsed);
    showToast('PDF imported — review and save');
  } catch (err) {
    console.error(err);
    alert('Could not read this PDF. You can enter the recipe manually instead.');
  } finally {
    if (progress) progress.classList.remove('show');
  }
});

async function extractDishImage(pdf) {
  // Pull the embedded photo out of page 1. The recipe sheets have one large
  // raster image (the dish), so we find it, convert its pixels to a canvas,
  // and return that. Falls back to a page render only if no usable image.
  const page = await pdf.getPage(1);

  // Render the page first — this forces pdf.js to load/resolve the image objects
  // so we can read them afterward.
  const viewport = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  // Collect every image drawn on the page.
  const ops = await page.getOperatorList();
  const imgNames = [];
  for (let i = 0; i < ops.fnArray.length; i++) {
    if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
      imgNames.push(ops.argsArray[i][0]);
    }
  }

  // Resolve an image object by name using the async callback form.
  // The synchronous get() throws if the object isn't ready yet — that was the bug.
  function resolveImg(name) {
    return new Promise((resolve) => {
      try {
        page.objs.get(name, (img) => resolve(img));
      } catch (e) { resolve(null); }
    });
  }

  // Find the largest image (the dish photo, not a tiny logo/icon).
  let best = null;
  for (const name of imgNames) {
    const img = await resolveImg(name);
    if (img && img.width > 200 && img.height > 200) {
      if (!best || img.width * img.height > best.width * best.height) best = img;
    }
  }

  if (best) {
    try {
      const out = imageObjToCanvas(best);
      if (out) {
        // Crop any uniform white margins baked into the source image,
        // then cap width so the stored data URL stays a reasonable size.
        const trimmed = trimWhiteBorders(out);
        return downscaleCanvas(trimmed, 1000).toDataURL('image/jpeg', 0.85);
      }
    } catch (e) { /* fall through */ }
  }

  // Fallback: a downscaled render of the whole page.
  return downscaleCanvas(canvas, 800).toDataURL('image/jpeg', 0.82);
}

// Detect and crop uniform near-white borders around a canvas. Recipe-sheet
// photos are often centered in a white frame; this removes that frame so the
// card/slideshow shows the dish edge-to-edge.
function trimWhiteBorders(src) {
  const w = src.width, h = src.height;
  const cx = src.getContext('2d');
  let data;
  try { data = cx.getImageData(0, 0, w, h).data; }
  catch (e) { return src; } // tainted canvas — skip trim
  const THRESH = 238;       // pixels brighter than this count as "white"
  const isWhiteRow = (y) => {
    for (let x = 0; x < w; x += 4) {
      const i = (y * w + x) * 4;
      if (data[i] < THRESH || data[i+1] < THRESH || data[i+2] < THRESH) return false;
    }
    return true;
  };
  const isWhiteCol = (x) => {
    for (let y = 0; y < h; y += 4) {
      const i = (y * w + x) * 4;
      if (data[i] < THRESH || data[i+1] < THRESH || data[i+2] < THRESH) return false;
    }
    return true;
  };
  let top = 0, bottom = h - 1, left = 0, right = w - 1;
  while (top < bottom && isWhiteRow(top)) top++;
  while (bottom > top && isWhiteRow(bottom)) bottom--;
  while (left < right && isWhiteCol(left)) left++;
  while (right > left && isWhiteCol(right)) right--;
  const cropW = right - left + 1, cropH = bottom - top + 1;
  // Only crop if it actually removed a meaningful border and leaves a sane image.
  if (cropW < w * 0.5 && cropH < h * 0.5) return src; // too aggressive, bail
  if (cropW >= w && cropH >= h) return src;            // nothing to trim
  if (cropW < 50 || cropH < 50) return src;
  const out = document.createElement('canvas');
  out.width = cropW; out.height = cropH;
  out.getContext('2d').drawImage(src, left, top, cropW, cropH, 0, 0, cropW, cropH);
  return out;
}

// Convert a pdf.js image object (raw pixel data) into a canvas.
function imageObjToCanvas(img) {
  const { width, height, kind } = img;
  const src = img.data;
  if (!src) {
    // Some builds expose an ImageBitmap instead of raw data.
    if (img.bitmap) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      c.getContext('2d').drawImage(img.bitmap, 0, 0);
      return c;
    }
    return null;
  }
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  const cx = c.getContext('2d');
  const out = cx.createImageData(width, height);
  const dst = out.data;
  // kind: 1 = grayscale, 2 = RGB, 3 = RGBA (pdf.js ImageKind enum)
  if (kind === 3 || src.length === width * height * 4) {
    dst.set(src);
  } else if (kind === 2 || src.length === width * height * 3) {
    for (let j = 0, k = 0; j < src.length; j += 3, k += 4) {
      dst[k] = src[j]; dst[k+1] = src[j+1]; dst[k+2] = src[j+2]; dst[k+3] = 255;
    }
  } else if (kind === 1 || src.length === width * height) {
    for (let j = 0, k = 0; j < src.length; j += 1, k += 4) {
      dst[k] = dst[k+1] = dst[k+2] = src[j]; dst[k+3] = 255;
    }
  } else {
    return null; // unknown format
  }
  cx.putImageData(out, 0, 0);
  return c;
}

// Downscale a canvas so its width is at most maxW, preserving aspect ratio.
function downscaleCanvas(src, maxW) {
  if (src.width <= maxW) return src;
  const ratio = maxW / src.width;
  const c = document.createElement('canvas');
  c.width = maxW;
  c.height = Math.round(src.height * ratio);
  c.getContext('2d').drawImage(src, 0, 0, c.width, c.height);
  return c;
}

function parseRecipeText(text, filename) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = { title: '', category: '', servings: '', prepTime: '', cookTime: '', description: '', ingredients: [], steps: [], notes: '' };

  // Title: first substantial line, or filename
  result.title = lines[0] && lines[0].length < 80 ? lines[0] : filename.replace(/\.pdf$/i, '');

  // Scan for metadata
  lines.forEach(l => {
    const low = l.toLowerCase();
    let m;
    if ((m = low.match(/serv(?:es|ings?)[:\s]+([\d\-–to ]+)/))) result.servings = m[1].trim();
    if ((m = low.match(/prep(?:\s*time)?[:\s]+([\d]+\s*(?:min|hr|hour|m|h)[a-z]*)/))) result.prepTime = m[1].trim();
    if ((m = low.match(/cook(?:\s*time)?[:\s]+([\d]+\s*(?:min|hr|hour|m|h)[a-z]*)/))) result.cookTime = m[1].trim();
  });

  // Section detection
  const ingIdx = lines.findIndex(l => /^ingredients?$/i.test(l) || /^ingredients[:]/i.test(l));
  const methodIdx = lines.findIndex(l => /^(method|steps|instructions|directions|preparation)[:]?$/i.test(l));

  if (ingIdx !== -1) {
    const end = methodIdx !== -1 ? methodIdx : lines.length;
    for (let i = ingIdx + 1; i < end; i++) {
      const l = lines[i].replace(/^[•\-\*\u2022]\s*/, '');
      if (!l) continue;
      // Split leading amount from item
      const am = l.match(/^([\d¼½¾⅓⅔⅛\/\.\s]+(?:g|kg|ml|l|oz|lb|cup|cups|tbsp|tsp|tablespoons?|teaspoons?|cloves?|each|pinch|bunch|can|cans)?\b)?\s*(.+)$/i);
      if (am && am[2]) {
        result.ingredients.push({ amount: (am[1]||'').trim(), item: am[2].trim() });
      } else {
        result.ingredients.push({ amount: '', item: l });
      }
    }
  }

  if (methodIdx !== -1) {
    for (let i = methodIdx + 1; i < lines.length; i++) {
      const l = lines[i].replace(/^\d+[\.\)]\s*/, '').replace(/^[•\-\*\u2022]\s*/, '');
      if (!l) continue;
      if (/^(notes?|chef'?s notes?|tips?)[:]?$/i.test(l)) {
        result.notes = lines.slice(i + 1).join(' ');
        break;
      }
      result.steps.push(l);
    }
  }

  // If no structured sections found, dump everything into description for manual cleanup
  if (ingIdx === -1 && methodIdx === -1) {
    result.description = lines.slice(1).join('\n');
  }

  if (result.ingredients.length === 0) result.ingredients = [{ amount: '', item: '' }];
  if (result.steps.length === 0) result.steps = [''];
  return result;
}

function populateFormFromParsed(p) {
  formImage = p.image || null;
  formIngredients = p.ingredients.length ? p.ingredients : [{ amount: '', item: '' }];
  formSteps = p.steps.length ? p.steps : [''];
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('f-title', p.title);
  set('f-category', p.category);
  set('f-servings', p.servings);
  set('f-preptime', p.prepTime);
  set('f-cooktime', p.cookTime);
  set('f-desc', p.description);
  set('f-notes', p.notes);
  renderIngEditor();
  renderStepsEditor();
  refreshImagePreview();
}

// ── REFRESH FROM CLOUD ──
// Pull latest recipes from Supabase, update the in-memory list, the on-screen
// view, and the local cache (so they're available offline next time).
async function refreshFromCloud() {
  if (!cloudMode || !isOnline) return;
  try {
    setSync('syncing');
    const cloud = await cloudFetchAll();
    recipes = cloud;
    await saveRecipes(recipes); // mirror into local cache
    renderIndex();
    setSync();
  } catch (e) {
    console.error('Cloud refresh failed, using cached copy', e);
    setSync();
  }
}

// ── INIT ──
async function init() {
  // 1. Local cache first — instant display, works with no internet.
  try {
    await openDB();
    recipes = await dbGetAll();
  } catch (e) {
    console.error('Local cache failed:', e);
    recipes = [];
  }

  // 2. Set up cloud if keys are present.
  const hasCloud = initCloud();

  if (!hasCloud) {
    // Offline-only mode: behave exactly like the non-cloud version.
    if (recipes.length === 0) { recipes = SEED_RECIPES; await saveRecipes(recipes); }
    updateAuthUI();
    setSync();
    renderIndex();
    return;
  }

  // 3. Cloud mode: render cached copy immediately, then sync.
  updateAuthUI();
  setSync();
  renderIndex();

  // Restore an existing session if the chef was already signed in.
  try {
    const { data } = await supa.auth.getSession();
    if (data && data.session) currentUser = data.session.user;
  } catch {}
  updateAuthUI();

  // Pull fresh data and push any queued offline edits.
  if (isOnline) {
    await flushPending();
    await refreshFromCloud();
  }
  setSync();
}
init();
</script>
