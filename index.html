<script>
// ── DATA STORE (IndexedDB) ──
const DB_NAME = 'kitchen_recipes_db';
const STORE = 'recipes';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(recipe) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(recipe);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// Persist the whole in-memory array (used after edits/imports). Clears then re-writes.
function saveRecipes(list) {
  return new Promise((resolve) => {
    if (!db) return resolve(false);
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    store.clear();
    list.forEach(r => store.put(r));
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => {
      alert('Could not save to storage. The device may be critically low on space.');
      resolve(false);
    };
  });
}

// ── CLOUD LAYER (Supabase) ──
let supa = null;
let cloudMode = false;     // true when keys are configured
let isOnline = navigator.onLine;
let currentUser = null;    // signed-in chef, or null
let pendingWrites = [];    // edits made while offline, pushed on reconnect

const CLOUD_TABLE = 'recipes';
const PENDING_KEY = 'kitchen_pending_writes';

function initCloud() {
  if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
    try {
      supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      cloudMode = true;
      // restore any queued offline writes
      try { pendingWrites = JSON.parse(localStorage.getItem(PENDING_KEY)) || []; } catch { pendingWrites = []; }
      return true;
    } catch (e) { console.error('Supabase init failed', e); cloudMode = false; }
  }
  return false;
}

async function cloudFetchAll() {
  const { data, error } = await supa.from(CLOUD_TABLE).select('*').order('title');
  if (error) throw error;
  // DB columns are snake_case; map to the app's shape
  return (data || []).map(row => ({
    id: row.id,
    title: row.title,
    category: row.category,
    description: row.description,
    servings: row.servings,
    prepTime: row.prep_time,
    cookTime: row.cook_time,
    ingredients: row.ingredients || [],
    steps: row.steps || [],
    notes: row.notes,
    image: row.image,
  }));
}

function toRow(r) {
  return {
    id: r.id, title: r.title, category: r.category, description: r.description,
    servings: r.servings, prep_time: r.prepTime, cook_time: r.cookTime,
    ingredients: r.ingredients, steps: r.steps, notes: r.notes, image: r.image,
  };
}

async function cloudUpsert(recipe) {
  const { error } = await supa.from(CLOUD_TABLE).upsert(toRow(recipe));
  if (error) throw error;
}
async function cloudDelete(id) {
  const { error } = await supa.from(CLOUD_TABLE).delete().eq('id', id);
  if (error) throw error;
}

function queueWrite(op, payload) {
  pendingWrites.push({ op, payload, ts: Date.now() });
  localStorage.setItem(PENDING_KEY, JSON.stringify(pendingWrites));
}
async function flushPending() {
  if (!cloudMode || !isOnline || !currentUser || pendingWrites.length === 0) return;
  setSync('syncing');
  const queue = [...pendingWrites];
  for (const w of queue) {
    try {
      if (w.op === 'upsert') await cloudUpsert(w.payload);
      else if (w.op === 'delete') await cloudDelete(w.payload);
      pendingWrites.shift();
      localStorage.setItem(PENDING_KEY, JSON.stringify(pendingWrites));
    } catch (e) { console.error('flush failed, will retry', e); break; }
  }
  setSync();
}

// ── SYNC STATUS PILL ──
function setSync(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  dot.className = 'sync-dot';
  if (!cloudMode) { label.textContent = 'Local'; return; }
  if (state === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Syncing…'; return; }
  if (isOnline) {
    dot.classList.add('online');
    label.textContent = currentUser ? 'Synced' : 'Live';
  } else {
    dot.classList.add('offline');
    label.textContent = pendingWrites.length ? `Offline · ${pendingWrites.length} queued` : 'Offline';
  }
}

window.addEventListener('online', () => { isOnline = true; setSync(); flushPending().then(refreshFromCloud); });
window.addEventListener('offline', () => { isOnline = false; setSync(); });

let currentFilter = 'All';

// ── PDF.JS WORKER ──
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── PIN GATE ──
const MANAGER_PIN = '4385';
let pinEntry = '';

function buildPinPad() {
  const pad = document.getElementById('pin-pad');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  pad.innerHTML = keys.map(k => {
    if (k === '') return '<div class="pin-key blank"></div>';
    return `<button class="pin-key" data-key="${k}">${k}</button>`;
  }).join('');
  pad.querySelectorAll('.pin-key[data-key]').forEach(btn => {
    btn.onclick = () => pinPress(btn.dataset.key);
  });
}

function requestManage() {
  // Cloud mode: require a real sign-in. Local-only mode: fall back to PIN.
  if (cloudMode) {
    if (currentUser) {
      showAdmin();
    } else {
      openAuth();
    }
    return;
  }
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-modal').classList.add('show');
}
function closePin() {
  document.getElementById('pin-modal').classList.remove('show');
  pinEntry = '';
  updatePinDots();
}
function pinPress(key) {
  if (key === '⌫') {
    pinEntry = pinEntry.slice(0, -1);
  } else if (pinEntry.length < 4) {
    pinEntry += key;
  }
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 150);
  }
}
function updatePinDots(error) {
  document.querySelectorAll('#pin-dots .pin-dot-input').forEach((d, i) => {
    d.classList.toggle('filled', i < pinEntry.length);
    d.classList.toggle('error', !!error);
  });
}
function checkPin() {
  if (pinEntry === MANAGER_PIN) {
    closePin();
    showAdmin();
  } else {
    updatePinDots(true);
    setTimeout(() => { pinEntry = ''; updatePinDots(); }, 600);
  }
}
buildPinPad();

// ── AUTH (cloud mode) ──
function openAuth() {
  document.getElementById('auth-error').textContent = '';
  document.getElementById('auth-modal').classList.add('show');
  setTimeout(() => document.getElementById('auth-email').focus(), 100);
}
function closeAuth() {
  document.getElementById('auth-modal').classList.remove('show');
}
async function doSignIn() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  if (!email || !password) { errEl.textContent = 'Enter email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) throw error;
    currentUser = data.user;
    closeAuth();
    updateAuthUI();
    setSync();
    showToast('Signed in');
    await flushPending();
    await refreshFromCloud();
    showAdmin();
  } catch (e) {
    errEl.textContent = e.message || 'Sign in failed.';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
async function signOut() {
  if (cloudMode && supa) { try { await supa.auth.signOut(); } catch {} }
  currentUser = null;
  updateAuthUI();
  setSync();
  showToast('Signed out');
  showIndex();
}
function updateAuthUI() {
  const btn = document.getElementById('manage-btn');
  if (!cloudMode) { btn.textContent = 'Manage'; return; }
  btn.textContent = currentUser ? 'Manage' : 'Sign In';
}


// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

}

}
function showIndex() { renderIndex(); showScreen('index-screen'); }
function showAdmin() {
  const so = document.getElementById('signout-btn');
  if (so) so.style.display = cloudMode ? '' : 'none';
  renderAdmin();
  showScreen('admin-screen');
}

// ── INDEX ──
function getCategories() {
  const cats = [...new Set(recipes.map(r => r.category).filter(Boolean))].sort();
  return ['All', ...cats];
}
function setFilter(tag) {
  currentFilter = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  renderIndex();
}
function renderIndex() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filterRow = document.getElementById('filter-row');
  filterRow.innerHTML = '';
  getCategories().forEach(cat => {
    const b = document.createElement('button');
    b.className = 'tag-btn' + (cat === currentFilter ? ' active' : '');
    b.dataset.tag = cat;
    b.textContent = cat;
    b.onclick = () => setFilter(cat);
    filterRow.appendChild(b);
  });

  const filtered = recipes.filter(r => {
    const matchCat = currentFilter === 'All' || r.category === currentFilter;
    const matchQ = !q || r.title.toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q) || (r.category||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('recipe-count').textContent = `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🍳</div><div class="empty-title">No recipes found</div><div class="empty-sub">Try adjusting your search or add a new recipe from Manage.</div></div>`;
    return;
  }

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      ${r.image ? `<img class="card-image" src="${r.image}" alt="${escAttr(r.title)}" />` : ''}
      <div class="card-category">${escHtml(r.category || 'Uncategorized')}</div>
      <div class="card-title">${escHtml(r.title)}</div>
      <div class="card-desc">${escHtml(r.description || '')}</div>
      <div class="card-meta">
        ${r.servings ? `<span>👥 ${escHtml(r.servings)} servings</span>` : ''}
        ${r.prepTime ? `<span>⏱ Prep ${escHtml(r.prepTime)}</span>` : ''}
        ${r.cookTime ? `<span>🔥 Cook ${escHtml(r.cookTime)}</span>` : ''}
      </div>`;
    card.onclick = () => showDetail(r.id);
    grid.appendChild(card);
  });
}

// ── DETAIL ──
function showDetail(id) {
  currentRecipeId = id;
  const r = recipes.find(r => r.id === id);
  if (!r) return;
  document.getElementById('detail-nav-title').textContent = r.title;
  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-category">${escHtml(r.category || 'Uncategorized')}</div>
    <div class="detail-title">${escHtml(r.title)}</div>
    ${r.image ? `<img class="detail-image" src="${r.image}" alt="${escAttr(r.title)}" />` : ''}
    ${r.description ? `<div class="detail-desc">${escHtml(r.description)}</div>` : ''}
    <div class="detail-meta-row">
      ${r.servings ? `<div class="meta-chip"><strong>Servings</strong>${escHtml(r.servings)}</div>` : ''}
      ${r.prepTime ? `<div class="meta-chip"><strong>Prep Time</strong>${escHtml(r.prepTime)}</div>` : ''}
      ${r.cookTime ? `<div class="meta-chip"><strong>Cook Time</strong>${escHtml(r.cookTime)}</div>` : ''}
    </div>
    <hr class="detail-divider" />
    <div class="section-label">Ingredients</div>
    <ul class="ingredients-list">
      ${(r.ingredients||[]).map(ing => `<li><span class="ing-amount">${escHtml(ing.amount)}</span><span>${escHtml(ing.item)}</span></li>`).join('')}
    </ul>
    <hr class="detail-divider" />
    <div class="section-label">Method</div>
    <ol class="steps-list">
      ${(r.steps||[]).map((s,i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${escHtml(s)}</div></div>`).join('')}
    </ol>
    ${r.notes ? `<div class="notes-box"><strong>Chef's Notes</strong>${escHtml(r.notes)}</div>` : ''}
  `;
  showScreen('detail-screen');
}

// ── SLIDESHOW ──
function buildSlidePages(r) {
  const pages = [];
  // Page 0: Title / overview
  pages.push({ type: 'title', recipe: r });
  // Page 1: Ingredients
  pages.push({ type: 'ingredients', recipe: r });
  // Page(s): Steps — chunk into groups of 4
  const steps = r.steps || [];
  for (let i = 0; i < steps.length; i += 4) {
    pages.push({ type: 'steps', recipe: r, steps: steps.slice(i, i+4), startIndex: i });
  }
  // Final page: notes if any
  if (r.notes) pages.push({ type: 'notes', recipe: r });
  return pages;
}

function renderSlidePage(page) {
  const body = document.getElementById('slide-body');
  const r = page.recipe;

  if (page.type === 'title') {
    body.innerHTML = `
      <div style="display:grid;grid-template-columns:${r.image ? '1.3fr 1fr' : '1fr'};gap:40px;align-items:start">
        <div>
          <div class="slide-category">${escHtml(r.category || 'Uncategorized')}</div>
          <div class="slide-main-title">${escHtml(r.title)}</div>
          ${r.description ? `<div class="slide-desc">${escHtml(r.description)}</div>` : ''}
          <div class="detail-meta-row">
            ${r.servings ? `<div class="meta-chip"><strong>Servings</strong>${escHtml(r.servings)}</div>` : ''}
            ${r.prepTime ? `<div class="meta-chip"><strong>Prep Time</strong>${escHtml(r.prepTime)}</div>` : ''}
            ${r.cookTime ? `<div class="meta-chip"><strong>Cook Time</strong>${escHtml(r.cookTime)}</div>` : ''}
          </div>
        </div>
        ${r.image ? `<img class="slide-image" src="${r.image}" alt="${escAttr(r.title)}" />` : ''}
      </div>
    `;
  } else if (page.type === 'ingredients') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Ingredients</div>
      <ul class="slide-ing-list">
        ${(r.ingredients||[]).map(ing => `<li><span class="slide-ing-amount">${escHtml(ing.amount)}</span><span>${escHtml(ing.item)}</span></li>`).join('')}
      </ul>
    `;
  } else if (page.type === 'steps') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Method${slidePages.filter(p=>p.type==='steps').length > 1 ? ` (${Math.floor(page.startIndex/4)+1})` : ''}</div>
      <ol class="slide-steps-list">
        ${page.steps.map((s,i) => `<div class="slide-step"><div class="slide-step-num">${page.startIndex+i+1}</div><div class="slide-step-text">${escHtml(s)}</div></div>`).join('')}
      </ol>
    `;
  } else if (page.type === 'notes') {
    body.innerHTML = `
      <div class="section-label" style="margin-bottom:20px">Chef's Notes</div>
      <div class="slide-notes"><strong>Remember</strong>${escHtml(r.notes)}</div>
    `;
  }

  // Update dots
  const dots = document.getElementById('slide-dots');
  dots.innerHTML = slidePages.map((_,i) => `<div class="slide-dot${i===slideIndex?' active':''}"></div>`).join('');

  // Update buttons
  document.getElementById('slide-prev').disabled = slideIndex === 0;
  const nextBtn = document.getElementById('slide-next');
  const isLast = slideIndex === slidePages.length - 1;
  nextBtn.disabled = false; // always clickable: advances, or finishes on the last slide
  nextBtn.textContent = isLast ? 'Done ✓' : 'Next →';
  nextBtn.onclick = isLast ? () => showDetail(currentRecipeId) : slideNext;
}

function startSlideshow() {
  const r = recipes.find(r => r.id === currentRecipeId);
  if (!r) return;
  slidePages = buildSlidePages(r);
  slideIndex = 0;
  document.getElementById('slide-nav-title').textContent = r.title;
  renderSlidePage(slidePages[slideIndex]);
  showScreen('slideshow-screen');
}

function slideNext() {
  if (slideIndex < slidePages.length - 1) {
    slideIndex++;
    renderSlidePage(slidePages[slideIndex]);
  }
}
function slidePrev() {
  if (slideIndex > 0) {
    slideIndex--;
    renderSlidePage(slidePages[slideIndex]);
  }
}

// swipe support
let touchStartX = 0;
document.getElementById('slideshow-screen').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('slideshow-screen').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? slideNext() : slidePrev();
}, { passive: true });

// ── ADMIN ──
let editingId = null;
let formIngredients = [];
let formSteps = [];
let formImage = null;

  editingId = null;
  const body = document.getElementById('admin-body');
  body.innerHTML = `
    <div class="admin-section-title">All Recipes</div>
    ${recipes.length === 0 ? '<div style="color:var(--muted);font-size:14px;padding:20px 0">No recipes yet. Add one above.</div>' : ''}
    <ul class="recipe-list-admin">
      ${recipes.map(r => `
        <li class="recipe-list-item">
          <div class="rli-info">
            <div class="rli-title">${escHtml(r.title)}</div>
            <div class="rli-cat">${escHtml(r.category || 'Uncategorized')}</div>
          </div>
          <div class="rli-actions">
            <button class="icon-btn" onclick="editRecipe('${r.id}')">Edit</button>
            <button class="icon-btn del" onclick="deleteRecipe('${r.id}')">Delete</button>
          </div>
        </li>`).join('')}
    </ul>
  `;
}

function showAddForm(id) {

  const r = id ? recipes.find(r => r.id === id) : null;
  formIngredients = r ? [...r.ingredients] : [{ amount: '', item: '' }];
  formSteps = r ? [...r.steps] : [''];
  formImage = r ? (r.image || null) : null;

  const body = document.getElementById('admin-body');
  body.innerHTML = `
    <div class="admin-section-title">${r ? 'Edit Recipe' : 'New Recipe'}</div>
    ${!r ? `
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('pdf-input').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-title">Upload a recipe PDF</div>
      <div class="upload-sub">Chef's PDF will be read automatically — text and the dish photo<br>get pulled in. You can review and edit everything before saving.</div>
      <div class="upload-progress" id="upload-progress">Reading PDF…</div>
    </div>
    <div class="divider-or">OR ENTER MANUALLY</div>
    ` : ''}
    <div class="form-group" id="image-group" style="${formImage ? '' : 'display:none'}">
      <label class="form-label">Dish Photo</label>
      <div class="img-preview-row">
        <img class="img-preview" id="img-preview" src="${formImage || ''}" alt="dish" />
        <button class="img-clear-btn" onclick="clearFormImage()">Remove photo</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Recipe Title *</label>
      <input class="form-input" id="f-title" placeholder="e.g. Pan-Seared Duck Breast" value="${r ? escHtml(r.title) : ''}" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <input class="form-input" id="f-category" placeholder="e.g. Proteins, Soups…" value="${r ? escHtml(r.category||'') : ''}" />
      </div>
      <div class="form-group">
        <label class="form-label">Servings</label>
        <input class="form-input" id="f-servings" placeholder="e.g. 4" value="${r ? escHtml(r.servings||'') : ''}" />
      </div>
      <div class="form-group">
        <label class="form-label">Prep / Cook</label>
        <input class="form-input" id="f-preptime" placeholder="Prep" style="margin-bottom:8px" value="${r ? escHtml(r.prepTime||'') : ''}" />
        <input class="form-input" id="f-cooktime" placeholder="Cook" value="${r ? escHtml(r.cookTime||'') : ''}" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Brief description…">${r ? escHtml(r.description||'') : ''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Ingredients</label>
      <div class="ingredients-editor" id="ing-editor"></div>
      <button class="add-btn" onclick="addIngRow()">+ Add ingredient</button>
    </div>
    <div class="form-group">
      <label class="form-label">Steps</label>
      <div class="steps-editor" id="steps-editor"></div>
      <button class="add-btn" onclick="addStepRow()">+ Add step</button>
    </div>
    <div class="form-group">
      <label class="form-label">Chef's Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Tips, variations, plating notes…">${r ? escHtml(r.notes||'') : ''}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
      <button class="btn btn-secondary" onclick="renderAdmin()">Cancel</button>
      ${r ? `<button class="btn btn-danger" onclick="deleteRecipe('${r.id}')">Delete</button>` : ''}
    </div>
  `;
  renderIngEditor();

}

function escHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function clearFormImage() {
  formImage = null;
  document.getElementById('image-group').style.display = 'none';
}
function refreshImagePreview() {
  const group = document.getElementById('image-group');
  const img = document.getElementById('img-preview');
  if (formImage && group && img) {
    img.src = formImage;
    group.style.display = '';
  }
}

function renderIngEditor() {
  const ed = document.getElementById('ing-editor');
  if (!ed) return;
  ed.innerHTML = formIngredients.map((ing, i) => `
    <div class="ing-row">
      <input class="form-input" placeholder="Amount" value="${escHtml(ing.amount)}" oninput="formIngredients[${i}].amount=this.value" />
      <input class="form-input" placeholder="Ingredient" value="${escHtml(ing.item)}" oninput="formIngredients[${i}].item=this.value" />
      <button class="remove-btn" onclick="removeIng(${i})">×</button>
    </div>`).join('');
}
function addIngRow() { formIngredients.push({ amount: '', item: '' }); renderIngEditor(); }
function removeIng(i) { formIngredients.splice(i, 1); renderIngEditor(); }

function renderStepsEditor() {
  const ed = document.getElementById('steps-editor');
  if (!ed) return;
  ed.innerHTML = formSteps.map((s, i) => `
    <div class="step-row">
      <textarea class="form-textarea" style="min-height:60px" placeholder="Step ${i+1}…" oninput="formSteps[${i}]=this.value">${escHtml(s)}</textarea>
      <button class="remove-btn" onclick="removeStep(${i})" style="margin-top:6px">×</button>
    </div>`).join('');
}
function addStepRow() { formSteps.push(''); renderStepsEditor(); }
function removeStep(i) { formSteps.splice(i, 1); renderStepsEditor(); }

function editRecipe(id) { showAddForm(id); }

async function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  recipes = recipes.filter(r => r.id !== id);
  await saveRecipes(recipes); // update local cache
  if (cloudMode) {
    if (isOnline && currentUser) {
      try { setSync('syncing'); await cloudDelete(id); setSync(); }
      catch (e) { console.error(e); queueWrite('delete', id); setSync(); }
    } else {
      queueWrite('delete', id); setSync();
    }
  }
  showToast('Recipe deleted');
  renderAdmin();
}

function saveRecipe() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Recipe title is required.'); return; }

  const data = {
    id: editingId || uid(),
    title,
    category: document.getElementById('f-category').value.trim(),
    servings: document.getElementById('f-servings').value.trim(),
    prepTime: document.getElementById('f-preptime').value.trim(),
    cookTime: document.getElementById('f-cooktime').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    ingredients: formIngredients.filter(i => i.item),
    steps: formSteps.filter(s => s.trim()),
    notes: document.getElementById('f-notes').value.trim(),
    image: formImage || null,
  };

  if (editingId) {
    recipes = recipes.map(r => r.id === editingId ? data : r);
  } else {
    recipes.push(data);
  }
  saveRecipes(recipes); // update local cache immediately
  if (cloudMode) {
    if (isOnline && currentUser) {
      setSync('syncing');
      cloudUpsert(data).then(() => setSync()).catch(e => { console.error(e); queueWrite('upsert', data); setSync(); });
    } else {
      queueWrite('upsert', data); setSync();
    }
  }
  showToast(editingId ? 'Recipe updated!' : 'Recipe added!');
  renderAdmin();
}

// ── PDF IMPORT ──
document.getElementById('pdf-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // reset so same file can be re-picked
  const progress = document.getElementById('upload-progress');
  if (progress) progress.classList.add('show');

  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    // Extract text from all pages
    let fullText = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      // Reconstruct lines using y-position
      let lastY = null, line = '';
      const lines = [];
      content.items.forEach(item => {
        const y = item.transform[5];
        if (lastY !== null && Math.abs(y - lastY) > 3) { lines.push(line.trim()); line = ''; }
        line += item.str + ' ';
        lastY = y;
      });
      if (line.trim()) lines.push(line.trim());
      fullText += lines.join('\n') + '\n';
    }

    // Extract largest image from page 1 as the dish photo
    let dishImage = null;
    try {
      dishImage = await extractDishImage(pdf);
    } catch (imgErr) { console.warn('Image extraction failed:', imgErr); }

    // Parse text into recipe fields
    const parsed = parseRecipeText(fullText, file.name);
    if (dishImage) parsed.image = dishImage;

    // Populate the form with parsed data
    populateFormFromParsed(parsed);
    showToast('PDF imported — review and save');
  } catch (err) {
    console.error(err);
    alert('Could not read this PDF. You can enter the recipe manually instead.');
  } finally {
    if (progress) progress.classList.remove('show');
  }
});

async function extractDishImage(pdf) {
  // Render page 1 to a canvas and use it as the dish image.
  // This reliably captures whatever photo is on the recipe sheet.
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Try to find the embedded raster image and crop to it; fall back to full page render
  const ops = await page.getOperatorList();
  let imgName = null;
  for (let i = 0; i < ops.fnArray.length; i++) {
    if (ops.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
      imgName = ops.argsArray[i][0];
      break;
    }
  }
  if (imgName && page.objs.has(imgName)) {
    try {
      const img = page.objs.get(imgName);
      if (img && img.width > 120 && img.height > 120) {
        const c2 = document.createElement('canvas');
        c2.width = img.width; c2.height = img.height;
        const cx = c2.getContext('2d');
        const imgData = cx.createImageData(img.width, img.height);
        const src = img.data;
        // Handle RGB vs RGBA
        if (src.length === img.width * img.height * 3) {
          for (let j = 0, k = 0; j < src.length; j += 3, k += 4) {
            imgData.data[k] = src[j]; imgData.data[k+1] = src[j+1];
            imgData.data[k+2] = src[j+2]; imgData.data[k+3] = 255;
          }
        } else {
          imgData.data.set(src);
        }
        cx.putImageData(imgData, 0, 0);
        return c2.toDataURL('image/jpeg', 0.82);
      }
    } catch (e) { /* fall through to page render */ }
  }
  // Fallback: downscale full page render
  const maxW = 800;
  if (canvas.width > maxW) {
    const c3 = document.createElement('canvas');
    const ratio = maxW / canvas.width;
    c3.width = maxW; c3.height = canvas.height * ratio;
    c3.getContext('2d').drawImage(canvas, 0, 0, c3.width, c3.height);
    return c3.toDataURL('image/jpeg', 0.82);
  }
  return canvas.toDataURL('image/jpeg', 0.82);
}

function parseRecipeText(text, filename) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = { title: '', category: '', servings: '', prepTime: '', cookTime: '', description: '', ingredients: [], steps: [], notes: '' };

  // Title: first substantial line, or filename
  result.title = lines[0] && lines[0].length < 80 ? lines[0] : filename.replace(/\.pdf$/i, '');

  // Scan for metadata
  lines.forEach(l => {
    const low = l.toLowerCase();
    let m;
    if ((m = low.match(/serv(?:es|ings?)[:\s]+([\d\-–to ]+)/))) result.servings = m[1].trim();
    if ((m = low.match(/prep(?:\s*time)?[:\s]+([\d]+\s*(?:min|hr|hour|m|h)[a-z]*)/))) result.prepTime = m[1].trim();
    if ((m = low.match(/cook(?:\s*time)?[:\s]+([\d]+\s*(?:min|hr|hour|m|h)[a-z]*)/))) result.cookTime = m[1].trim();
  });

  // Section detection
  const ingIdx = lines.findIndex(l => /^ingredients?$/i.test(l) || /^ingredients[:]/i.test(l));
  const methodIdx = lines.findIndex(l => /^(method|steps|instructions|directions|preparation)[:]?$/i.test(l));

  if (ingIdx !== -1) {
    const end = methodIdx !== -1 ? methodIdx : lines.length;
    for (let i = ingIdx + 1; i < end; i++) {
      const l = lines[i].replace(/^[•\-\*\u2022]\s*/, '');
      if (!l) continue;
      // Split leading amount from item
      const am = l.match(/^([\d¼½¾⅓⅔⅛\/\.\s]+(?:g|kg|ml|l|oz|lb|cup|cups|tbsp|tsp|tablespoons?|teaspoons?|cloves?|each|pinch|bunch|can|cans)?\b)?\s*(.+)$/i);
      if (am && am[2]) {
        result.ingredients.push({ amount: (am[1]||'').trim(), item: am[2].trim() });
      } else {
        result.ingredients.push({ amount: '', item: l });
      }
    }
  }

  if (methodIdx !== -1) {
    for (let i = methodIdx + 1; i < lines.length; i++) {
      const l = lines[i].replace(/^\d+[\.\)]\s*/, '').replace(/^[•\-\*\u2022]\s*/, '');
      if (!l) continue;
      if (/^(notes?|chef'?s notes?|tips?)[:]?$/i.test(l)) {
        result.notes = lines.slice(i + 1).join(' ');
        break;
      }
      result.steps.push(l);
    }
  }

  // If no structured sections found, dump everything into description for manual cleanup
  if (ingIdx === -1 && methodIdx === -1) {
    result.description = lines.slice(1).join('\n');
  }

  if (result.ingredients.length === 0) result.ingredients = [{ amount: '', item: '' }];
  if (result.steps.length === 0) result.steps = [''];
  return result;
}

function populateFormFromParsed(p) {
  formImage = p.image || null;
  formIngredients = p.ingredients.length ? p.ingredients : [{ amount: '', item: '' }];
  formSteps = p.steps.length ? p.steps : [''];
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('f-title', p.title);
  set('f-category', p.category);
  set('f-servings', p.servings);
  set('f-preptime', p.prepTime);
  set('f-cooktime', p.cookTime);
  set('f-desc', p.description);
  set('f-notes', p.notes);
  renderIngEditor();
  renderStepsEditor();
  refreshImagePreview();
}

// ── REFRESH FROM CLOUD ──
// Pull latest recipes from Supabase, update the in-memory list, the on-screen
// view, and the local cache (so they're available offline next time).
async function refreshFromCloud() {
  if (!cloudMode || !isOnline) return;
  try {
    setSync('syncing');
    const cloud = await cloudFetchAll();
    recipes = cloud;
    await saveRecipes(recipes); // mirror into local cache
    renderIndex();
    setSync();
  } catch (e) {
    console.error('Cloud refresh failed, using cached copy', e);
    setSync();
  }
}

// ── INIT ──
async function init() {
  // 1. Local cache first — instant display, works with no internet.
  try {
    await openDB();
    recipes = await dbGetAll();
  } catch (e) {
    console.error('Local cache failed:', e);
    recipes = [];
  }

  // 2. Set up cloud if keys are present.
  const hasCloud = initCloud();

  if (!hasCloud) {
    // Offline-only mode: behave exactly like the non-cloud version.
    if (recipes.length === 0) { recipes = SEED_RECIPES; await saveRecipes(recipes); }
    updateAuthUI();
    setSync();
    renderIndex();
    return;
  }

  // 3. Cloud mode: render cached copy immediately, then sync.
  updateAuthUI();
  setSync();
  renderIndex();

  // Restore an existing session if the chef was already signed in.
  try {
    const { data } = await supa.auth.getSession();
    if (data && data.session) currentUser = data.session.user;
  } catch {}
  updateAuthUI();

  // Pull fresh data and push any queued offline edits.
  if (isOnline) {
    await flushPending();
    await refreshFromCloud();
  }
  setSync();
}
init();
